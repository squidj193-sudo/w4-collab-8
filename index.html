<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>我們組的 Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <header>
      <!-- 組長任務：把這裡改成你們組的名稱 -->
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <h1>🤖 第 8 組的 Chatbot</h1>
          <p class="subtitle">W4 多人協作練習</p>
        </div>
        <button id="theme-toggle"
          style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;">🌙
          深色模式</button>
      </div>
    </header>

    <!-- 組員 A 任務：在這裡加上訊息計數顯示 -->
    <p id="counter">訊息數：0</p>

    <div id="chat-box">
      <div class="message bot">
        嗨！這是我們組一起做的 Chatbot 🎉
      </div>
      <div class="message bot">
        我是組員<strong>吳東霖</strong>，歡迎來到我們的聊天室！試著跟我打聲招呼吧。
      </div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="輸入訊息...">
      <button onclick="sendMessage()">送出</button>
      <button id="clear-btn" onclick="clearChat()">清除對話</button>
    </div>

    <!-- 組員 B 任務：在這裡加上組員名單 -->
    <footer>
      <p>組員：江庭翔、葉書愷、吳東霖、黃元稜</p>
    </footer>
  </div>

  <script>
    function updateCounter() {
      const count = document.querySelectorAll('#chat-box .message').length;
      document.getElementById('counter').textContent = `訊息數：${count}`;
    }

    // 初始化計數器
    updateCounter();

    function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const text = input.value.trim();

      if (!text) return;

      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.textContent = text;
      chatBox.appendChild(userDiv);

      const botDiv = document.createElement('div');
      botDiv.className = 'message bot';

      // 組員 C 任務：自訂回覆邏輯
      let botResponse = '';
      if (text.includes('你好') || text.includes('哈囉') || text.includes('hi')) {
        botResponse = '你好呀！很高興見到你。';
      } else if (text.includes('你是誰') || text.includes('名字')) {
        botResponse = '我是這組開發的智慧小助手，由吳東霖負責調整我的邏輯！';
      } else if (text.includes('功能') || text.includes('幫助')) {
        botResponse = '我可以陪你聊天，目前我還在學習中。你可以試著對我說「你好」或問我是誰。';
      } else {
        botResponse = `你說了「${text}」！這聽起來很有趣！`;
      }

      botDiv.textContent = botResponse;
      chatBox.appendChild(botDiv);

      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;
      updateCounter();
    }

    function clearChat() {
      const chatBox = document.getElementById('chat-box');
      chatBox.innerHTML = `
        <div class="message bot">
          嗨！這是我們組一起做的 Chatbot 🎉
        </div>
      `;
      updateCounter();
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendMessage();
    });

    // 組員 D 任務：深色模式切換邏輯
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;

    // 初始化：檢查 localStorage
    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
      themeToggle.textContent = '☀️ 淺色模式';
    }

    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      if (body.classList.contains('dark')) {
        localStorage.setItem('theme', 'dark');
        themeToggle.textContent = '☀️ 淺色模式';
      } else {
        localStorage.setItem('theme', 'light');
        themeToggle.textContent = '🌙 深色模式';
      }
    });
  </script>

</body>

</html>
